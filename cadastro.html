<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - AURA Perfumaria</title>
    <link rel="stylesheet" href="reset.css">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        header {
            background: #BBBBBB;
            padding: 20px 0;
            width: 100%;
        }
        .caixa {
            width: 940px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav li {
            display: inline;
            margin: 0 0 0 25px;
        }
        nav a {
            text-transform: uppercase;
            color: #000000;
            font-weight: bold;
            font-size: 22px;
            text-decoration: none;
        }
        .container-login {
            width: 100%;
            max-width: 940px;
            margin: 0 auto;
            padding: 60px 20px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .card-login {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }
        .card-login h2 {
            font-size: 28px;
            color: #000000;
            font-weight: bold;
            text-align: center;
            margin-bottom: 24px;
            text-transform: uppercase;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .campo {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .campo label {
            font-size: 16px;
            font-weight: bold;
            color: #374151;
        }
        .campo input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn-ok {
            background-color: #C78C19;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-ok:disabled {
            background-color: #9ca3af;
        }
        .links-alternativos {
            margin-top: 24px;
            border-top: 1px solid #e5e7eb;
            padding-top: 16px;
            text-align: center;
        }
        .links-alternativos a {
            color: #555555;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
        footer {
            text-align: center;
            background: url("bg.png") #111111;
            padding: 40px 0;
            width: 100%;
        }
        .copyright { color: #FFFFFF; font-size: 13px; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="caixa">
            <h1><img src="sauvage.png" alt="Logo Sauvage"></h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="produto.html">Produtos</a></li>
                    <li><a href="contato.html">Contato</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container-login">
        <div class="card-login">
            <h2>Cadastro</h2>
            <form id="lpForm">
                <div class="campo">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Ex: João Silva" required>
                </div>
                <div class="campo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Ex: joao@exemplo.com" required>
                </div>
                <div class="campo">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" placeholder="Ex: (11) 99999-9999" required>
                </div>
                <div class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Crie uma senha" required>
                </div>
                <div class="campo">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="Digite o seu CPF" required>
                </div>
                <div class="campo">
                    <label for="repete_senha">Reescreva a Senha</label>
                    <input type="password" id="repete_senha" placeholder="Confirme sua senha" required>
                </div>
                <button type="submit" id="btnSubmit" class="btn-ok">Finalizar Cadastro</button>
            </form>
            <div class="links-alternativos">
                <a href="login.html">← Já tem uma conta? Entrar</a>
            </div>
        </div>
    </main>

    <footer>
        <img src="aura-logo2.png" alt="Logo Aura">
        <p class="copyright">© Copyright AURA Perfumaria - 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://vlhwfqisavwsnjkpkmkm.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsaHdmcWlzYXZ3c25qa3BrbWttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjIxNzgsImV4cCI6MjA5MjUzODE3OH0.31kS9OK8gHTqDW8yV1G4hnBfAHAcwYvOZDocqATonN4";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const formCadastro = document.getElementById('lpForm');
        const btnSubmit = document.getElementById('btnSubmit');

        formCadastro.addEventListener('submit', async (e) => {
            e.preventDefault();

            const senha = document.getElementById('senha').value;
            const reSenha = document.getElementById('repete_senha').value;

            if (senha !== reSenha) {
                alert("Atenção: As senhas informadas não coincidem!");
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerText = "Cadastrando...";

            const nomeCompleto = document.getElementById('nome').value;
            const emailContato = document.getElementById('email').value;
            const telefoneContato = document.getElementById('telefone').value;
            const cpfContato = document.getElementById('cpf').value;

            try {
                const { data, error } = await _supabase
                    .from('cadastro') 
                    .insert([
                        { 
                            nome: nomeCompleto, 
                            email: emailContato, 
                            telefone: telefoneContato,
                            cpf: cpfContato,
                            senha: senha
                        }
                    ])
                    .select();

                if (error) {
                    console.error(error);
                    alert(`Erro do Supabase: ${error.message}`);
                    return;
                }

                alert('Cadastro realizado com sucesso!');
                formCadastro.reset();
                window.location.href = "login.html"; // Redireciona para a página de login separada

            } catch (err) {
                alert('Erro inesperado: ' + err.message);
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Finalizar Cadastro";
            }
        });
    </script>
</body>
</html>
