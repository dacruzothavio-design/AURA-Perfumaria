<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AURA Perfumaria</title>
    <link rel="stylesheet" href="reset.css">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        header {
            background: #BBBBBB;
            padding: 20px 0;
            width: 100%;
        }
        .caixa {
            width: 940px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav li {
            display: inline;
            margin: 0 0 0 25px;
        }
        nav a {
            text-transform: uppercase;
            color: #000000;
            font-weight: bold;
            font-size: 22px;
            text-decoration: none;
        }
        .container-login {
            width: 100%;
            max-width: 940px;
            margin: 0 auto;
            padding: 60px 20px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .card-login {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }
        .card-login h2 {
            font-size: 28px;
            color: #000000;
            font-weight: bold;
            text-align: center;
            margin-bottom: 24px;
            text-transform: uppercase;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .campo {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .campo label {
            font-size: 16px;
            font-weight: bold;
            color: #374151;
        }
        .campo input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn-ok {
            background-color: #C78C19;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        .links-alternativos {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid #e5e7eb;
            padding-top: 16px;
        }
        .links-alternativos a {
            color: #555555;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
        .escondido {
            display: none !important;
        }
        footer {
            text-align: center;
            background: url("bg.png") #111111;
            padding: 40px 0;
            width: 100%;
        }
        .copyright { color: #FFFFFF; font-size: 13px; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <div class="caixa">
            <h1><img src="sauvage.png" alt="Logo Sauvage"></h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="produto.html">Produtos</a></li>
                    <li><a href="contato.html">Contato</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container-login">
        <div id="tela-login" class="card-login">
            <h2>Login</h2>
            <form id="formLogin">
                <div class="campo">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" placeholder="Digite seu e-mail" required>
                </div>
                <div class="campo">
                    <label for="login-senha">Senha</label>
                    <input type="password" id="login-senha" placeholder="Digite sua senha" required>
                </div>
                <button type="submit" id="btnLoginSubmit" class="btn-ok">Entrar</button>
            </form>
            <div class="links-alternativos">
                <a href="#" onclick="alternarTela('recuperar')">- Esqueci minha senha</a>
                <a href="cadastro.html">- Criar conta</a>
            </div>
        </div>

        <div id="tela-recuperar" class="card-login escondido">
            <h2>Recuperar Senha</h2>
            <form onsubmit="event.preventDefault(); alert('Se o e-mail existir no sistema, você receberá instruções de recuperação.'); alternarTela('login');">
                <div class="campo">
                    <label for="recuperar-email">Digite o seu E-mail</label>
                    <input type="email" id="recuperar-email" placeholder="seu-email@exemplo.com" required>
                </div>
                <button type="submit" class="btn-ok">Enviar Código</button>
            </form>
            <div class="links-alternativos">
                <a href="#" onclick="alternarTela('login')">← Voltar para o Login</a>
            </div>
        </div>
    </main>

    <footer>
        <img src="aura-logo2.png" alt="Logo Aura">
        <p class="copyright">© Copyright AURA Perfumaria - 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        function alternarTela(tela) {
            document.getElementById('tela-login').classList.add('escondido');
            document.getElementById('tela-recuperar').classList.add('escondido');

            if (tela === 'login') {
                document.getElementById('tela-login').classList.remove('escondido');
            } else if (tela === 'recuperar') {
                document.getElementById('tela-recuperar').classList.remove('escondido');
            }
        }

        const SUPABASE_URL = "https://vlhwfqisavwsnjkpkmkm.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsaHdmcWlzYXZ3c25qa3BrbWttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjIxNzgsImV4cCI6MjA5MjUzODE3OH0.31kS9OK8gHTqDW8yV1G4hnBfAHAcwYvOZDocqATonN4";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const formLogin = document.getElementById('formLogin');
        const btnLoginSubmit = document.getElementById('btnLoginSubmit');

        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();

            btnLoginSubmit.disabled = true;
            btnLoginSubmit.innerText = "Verificando...";

            const emailDigitado = document.getElementById('login-email').value;
            const senhaDigitada = document.getElementById('login-senha').value;

            try {
                // Procura na tabela 'cadastro' uma linha onde email E senha correspondam ao digitado
                const { data, error } = await _supabase
                    .from('cadastro')
                    .select('*')
                    .eq('email', emailDigitado)
                    .eq('senha', senhaDigitada);

                if (error) {
                    alert('Erro ao conectar ao banco de dados: ' + error.message);
                    return;
                }

                // Se o array retornar com algum registro encontrado
                if (data && data.length > 0) {
                    alert(`Seja bem-vindo de volta, ${data[0].nome}!`);
                    window.location.href = "index.html"; // Redireciona para a Home do seu site
                } else {
                    alert('E-mail ou senha incorretos. Tente novamente.');
                }

            } catch (err) {
                alert('Erro no sistema: ' + err.message);
            } finally {
                btnLoginSubmit.disabled = false;
                btnLoginSubmit.innerText = "Entrar";
            }
        });
    </script>
</body>
</html>
